<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Multiple Models</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    model-viewer {
      flex: 1;
      width: 100%;
    }

    .model-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: #fff;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="model-buttons">
  <button onclick="loadModel('KAM-55CMC32.glb')">Model 1</button>
  <button onclick="loadModel('KAM-66XYZ.glb')">Model 2</button>
  <button onclick="loadModel('KAM-77ABC.glb')">Model 3</button>
</div>

<model-viewer
  id="modelViewer"
  src="KAM-55CMC32.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-placement="floor"
  camera-controls
  auto-rotate>

  <button slot="ar-button">
    View in your space
  </button>
</model-viewer>

<script>
  function loadModel(modelPath) {
    const viewer = document.getElementById('modelViewer');
    viewer.src = modelPath;
  }
</script>

</body>
</html>

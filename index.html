<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Model Selector</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .model-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px;
      justify-content: center;
      background: #fff;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 5px;
      background: #f0f0f0;
      transition: background 0.2s, color 0.2s;
    }

    button.active {
      background: #007bff;
      color: white;
      border-color: #0056b3;
    }

    model-viewer {
      flex: 1;
      width: 100%;
      height: 100%;
      background: #f5f5f5;
    }
  </style>
</head>

<body>

<div class="model-buttons" id="buttons"></div>

<model-viewer
  id="modelViewer"
  src="models/KAM-55CMC32.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-placement="floor"
  camera-controls
  auto-rotate>
  <button slot="ar-button">View in your space</button>
</model-viewer>

<script>
  const models = [
    { path: "models/KAM-55CMC32.glb", label: "KAM-55CMC32" },
    { path: "models/KOLIN KAM-75DRC32.glb", label: "KAM-75DRC32" },
    { path: "models/Kolin KAG75WCINV, KAG100WCINV, KAG145WCINV, KAG200WCINV, KAG250WCINV Series.glb", label: "KAG Series" },
    { path: "models/WAR100IGT_with_remote.glb", label: "WAR100IGT" },
    { path: "models/lg_LA080GC2.glb", label: "LG LA080GC2" }
  ];

  const buttonsDiv = document.getElementById("buttons");
  const viewer = document.getElementById("modelViewer");

  let activeButton = null;

  models.forEach(model => {
    const btn = document.createElement("button");
    btn.textContent = model.label;

    btn.addEventListener("click", () => {
      // Highlight active button
      if (activeButton) activeButton.classList.remove("active");
      btn.classList.add("active");
      activeButton = btn;

      // Encode URL for safety
      const encodedPath = encodeURI(model.path);

      // Force reload model
      viewer.removeAttribute("src");
      setTimeout(() => {
        viewer.src = encodedPath;
      }, 50);
    });

    // Set first button as active by default
    if (!activeButton) {
      btn.classList.add("active");
      activeButton = btn;
    }

    buttonsDiv.appendChild(btn);
  });
</script>

</body>
</html>

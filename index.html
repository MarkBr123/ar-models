<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Model Selector</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .model-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px;
      justify-content: center;
      background: #fff;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    model-viewer {
      flex: 1;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<div class="model-buttons" id="buttons"></div>

<model-viewer
  id="modelViewer"
  src="models/KAM-55CMC32.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-placement="floor"
  camera-controls
  auto-rotate>
  <button slot="ar-button">View in your space</button>
</model-viewer>

<script>
  const models = [
    "models/KAM-55CMC32.glb",
    "models/KOLIN KAM-75DRC32.glb",
    "models/Kolin KAG75WCINV, KAG100WCINV, KAG145....glb",
    "models/WAR100IGT_with_remote.glb",
    "models/lg_LA080GC2.glb"
  ];

  const buttonsDiv = document.getElementById("buttons");
  const viewer = document.getElementById("modelViewer");

  models.forEach(modelPath => {
    const btn = document.createElement("button");
    // Use filename as label
    const fileName = modelPath.split("/").pop();
    btn.textContent = fileName;

    btn.addEventListener("click", () => {
      // Remove src first to force reload
      viewer.removeAttribute("src");
      setTimeout(() => {
        viewer.src = modelPath;
      }, 50);
    });

    buttonsDiv.appendChild(btn);
  });
</script>

</body>
</html>

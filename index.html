<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AR Cooling Models</title>
    <!-- Model Viewer Library -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0d1428;
            background: radial-gradient(circle at 70% 20%, rgba(42, 88, 160, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(25, 60, 120, 0.3) 0%, transparent 45%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* Main Container - Fully Responsive */
        .ar-dashboard {
            max-width: 1400px;
            width: 100%;
            background: rgba(8, 20, 36, 0.85);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(75, 140, 230, 0.3);
            border-radius: clamp(20px, 5vw, 48px);
            padding: clamp(16px, 4vw, 32px);
            box-shadow: 0 40px 70px -20px #000000;
        }

        /* Header - Responsive Flex */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(16px, 4vw, 28px);
            flex-wrap: wrap;
            gap: 15px;
        }

        .title h1 {
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            font-weight: 700;
            background: linear-gradient(145deg, #ffffff, #b8d6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .badge {
            background: #1e3b62;
            border-radius: 40px;
            padding: 4px 12px;
            color: #b9d6ff;
            font-weight: 500;
            font-size: 0.8rem;
            display: inline-block;
            border: 1px solid #3f6ca5;
            margin-top: 6px;
        }

        .user-session {
            background: rgba(20, 40, 68, 0.7);
            border: 1px solid #2f5688;
            border-radius: 60px;
            padding: 8px 16px;
            color: #c6ddff;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.9rem;
        }

        /* AR Feature Banner - Responsive */
        .ar-feature-banner {
            display: flex;
            align-items: center;
            gap: clamp(10px, 3vw, 20px);
            background: linear-gradient(110deg, #0a264a, #12325b);
            border-radius: 60px;
            padding: clamp(12px, 3vw, 20px) clamp(16px, 4vw, 28px);
            margin-bottom: clamp(20px, 4vw, 30px);
            border: 1px solid #5180c0;
            flex-wrap: wrap;
        }

        .ar-badge {
            background: #4790ff;
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: 700;
            color: white;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            white-space: nowrap;
        }

        .ar-description {
            color: #d2e4ff;
            font-weight: 400;
            flex: 1;
            min-width: 200px;
            font-size: 0.95rem;
        }

        .ar-icon {
            font-size: clamp(1.8rem, 5vw, 2.2rem);
        }

        /* Viewer Card - Responsive Height */
        .viewer-card {
            border-radius: clamp(20px, 4vw, 36px);
            overflow: hidden;
            background: #07111f;
            border: 1px solid rgba(85, 155, 255, 0.5);
            box-shadow: 0 30px 45px -20px #000000;
            margin-bottom: clamp(20px, 4vw, 30px);
        }

        model-viewer {
            width: 100%;
            height: clamp(300px, 50vh, 550px);
            background: #030c1a;
            --progress-bar-color: #ffb85c;
        }

        /* AR Button Inside Viewer */
        .ar-inside-btn {
            background: linear-gradient(145deg, #1c3d6a, #0f2542) !important;
            border-radius: 50px !important;
            color: white !important;
            font-weight: 600 !important;
            border: 2px solid #6093dd !important;
            padding: clamp(8px, 2vw, 14px) clamp(16px, 4vw, 36px) !important;
            font-size: clamp(0.8rem, 2.5vw, 1rem) !important;
            box-shadow: 0 10px 22px -5px black !important;
            margin: clamp(10px, 2vw, 20px) !important;
            white-space: nowrap;
        }

        /* Filter Tabs - Responsive Wrap */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            border-bottom: 1px solid #2b4870;
            padding-bottom: 16px;
            margin-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .filter-tab {
            background: none;
            border: none;
            color: #9eb9e0;
            font-weight: 600;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            padding: 8px 4px 10px 4px;
            border-bottom: 4px solid transparent;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-tab:hover {
            color: white;
            border-bottom-color: #608eda;
        }

        .filter-tab.active {
            color: white;
            border-bottom-color: #7eb4ff;
        }

        /* Grid Wrapper - Responsive Height */
        .grid-wrapper {
            max-height: clamp(200px, 35vh, 300px);
            overflow-y: auto;
            padding-right: 6px;
            margin-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: #3366a0 #112945;
        }

        .grid-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .grid-wrapper::-webkit-scrollbar-track {
            background: #132b47;
            border-radius: 20px;
        }

        .grid-wrapper::-webkit-scrollbar-thumb {
            background: #2b5890;
            border-radius: 20px;
        }

        .model-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        /* Model Cards - Fully Responsive */
        .model-card {
            background: linear-gradient(145deg, #1f385b, #122643);
            border: 1px solid #426fb0;
            border-radius: 100px;
            padding: 8px 16px;
            font-weight: 500;
            font-size: clamp(0.75rem, 2.2vw, 0.9rem);
            color: #e1f0ff;
            cursor: pointer;
            box-shadow: 0 8px 14px -12px black;
            transition: 0.18s ease;
            white-space: nowrap;
            max-width: min(280px, 85vw);
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .model-card:before {
            content: "❄️";
            font-size: 0.9rem;
        }

        .model-card:hover {
            background: linear-gradient(145deg, #295689, #1a3e64);
            border-color: #7aa9ff;
            transform: translateY(-2px);
        }

        .model-card.selected {
            background: linear-gradient(145deg, #1d5092, #113670);
            border-color: #b6d3ff;
            box-shadow: 0 0 15px #3e85f0;
            font-weight: 600;
        }

        .model-card.selected:before {
            content: "✨";
        }

        /* Footer - Responsive */
        .footer-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed #325585;
            padding-top: 16px;
            color: #8fb1e0;
            flex-wrap: wrap;
            gap: 12px;
        }

        .visible-count {
            background: #1d3d63;
            border-radius: 30px;
            padding: 6px 16px;
            border: 1px solid #3e70b0;
            font-size: 0.85rem;
        }

        .ar-note {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .pill {
            background: #2a4e7e;
            border-radius: 30px;
            padding: 5px 14px;
            color: white;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        /* Phone Optimization */
        @media (max-width: 600px) {
            body { padding: 8px; }
            
            .header-area {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .user-session {
                width: 100%;
                justify-content: space-between;
            }
            
            .ar-feature-banner {
                flex-direction: column;
                text-align: center;
            }
            
            .filter-bar {
                padding-bottom: 12px;
                gap: 5px 10px;
            }
            
            .model-card {
                padding: 6px 14px;
            }
            
            .footer-stats {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Small Phones */
        @media (max-width: 380px) {
            .user-session {
                flex-direction: column;
                gap: 5px;
            }
            
            .filter-tab {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="ar-dashboard">
        <!-- Header -->
        <div class="header-area">
            <div class="title">
                <h1>AR Cooling Models</h1>
                <div class="badge">34 models · AR ready</div>
            </div>
            <div class="user-session">
                <span>👤 guest</span>
                <span>📅 <span id="currentDate"></span></span>
            </div>
        </div>

        <!-- AR Banner -->
        <div class="ar-feature-banner">
            <span class="ar-icon">🪄</span>
            <span class="ar-badge">AR READY</span>
            <span class="ar-description">Point your phone at the floor to place any model in your space</span>
        </div>

        <!-- 3D Viewer -->
        <div class="viewer-card">
            <model-viewer 
                id="modelViewer"
                src="https://markbr123.github.io/ar-models/KAM-55CMC32.glb"
                ar
                ar-modes="webxr scene-viewer quick-look"
                ar-placement="floor"
                ar-scale="auto"
                camera-controls
                exposure="0.85"
                shadow-intensity="0.3"
                autoplay
                environment-image="neutral">
                <button slot="ar-button" class="ar-inside-btn">
                    📱 VIEW IN YOUR SPACE
                </button>
            </model-viewer>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-bar">
            <button class="filter-tab active" data-filter="all">✨ ALL</button>
            <button class="filter-tab" data-filter="tosot">🥶 TOSOT</button>
            <button class="filter-tab" data-filter="fujidenzo">🌀 FUJIDENZO</button>
            <button class="filter-tab" data-filter="daikin">🏯 DAIKIN</button>
            <button class="filter-tab" data-filter="carrier">Ⓜ️ CARRIER</button>
            <button class="filter-tab" data-filter="kolin">❄️ KOLIN</button>
            <button class="filter-tab" data-filter="gree">🌬️ GREE</button>
            <button class="filter-tab" data-filter="nexus">⚡ NEXUS</button>
            <button class="filter-tab" data-filter="lg">📀 LG</button>
        </div>

        <!-- Model Grid -->
        <div class="grid-wrapper">
            <div class="model-grid" id="modelGrid"></div>
        </div>

        <!-- Footer -->
        <div class="footer-stats">
            <span class="visible-count" id="visibleCount">0 models visible</span>
            <span class="ar-note">
                <span class="pill">📱 AR ready</span>
                <span>👇 click card to load</span>
            </span>
        </div>
    </div>

    <script>
        // Set current date
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { 
            month: 'short', 
            day: 'numeric' 
        });

        // Model data
        const models = [
            // Tosot
            { file: "Tosot-supracol-inverter.glb", name: "Tosot Supracol", cat: "tosot" },
            // Fujidenzo
            { file: "fujidenzo_war100igt_with_remote.glb", name: "Fujidenzo WAR100IGT", cat: "fujidenzo" },
            { file: "fujidenzo-wam632igt.glb", name: "Fujidenzo WAM632IGT", cat: "fujidenzo" },
            { file: "fujidenzo-war632igt.glb", name: "Fujidenzo WAR632IGT", cat: "fujidenzo" },
            { file: "WAR100IGT_with_remote.glb", name: "WAR100IGT", cat: "fujidenzo" },
            { file: "WAR632IGT.glb", name: "WAR632IGT", cat: "fujidenzo" },
            { file: "WAM632IGT.glb", name: "WAM632IGT", cat: "fujidenzo" },
            // Gree/Kolin
            { file: "gree-full-dc-inverter-1and1.5hp.glb", name: "Gree Full DC", cat: "gree" },
            { file: "KOLIN KAM-75DRC32.glb", name: "Kolin KAM-75", cat: "kolin" },
            { file: "Kolin_Premium_primus_gold.glb", name: "Kolin Premium", cat: "kolin" },
            { file: "KAM-75DRC32.glb", name: "KAM-75DRC32", cat: "kolin" },
            { file: "KAM-55CMC32.glb", name: "KAM-55CMC32", cat: "kolin" },
            // Daikin
            { file: "daikin-D-Series-FTKQ25BVA-1Hp.glb", name: "Daikin D 1HP", cat: "daikin" },
            { file: "daikin-D-Series-FTKQ35BVA-1.5-2Hp.glb", name: "Daikin D 1.5HP", cat: "daikin" },
            { file: "daikin-king-series-1-1.5hp.glb", name: "Daikin King", cat: "daikin" },
            { file: "daikin-queen-ava-1-1.5hp.glb", name: "Daikin Queen", cat: "daikin" },
            // Carrier
            { file: "carrier_aura_inverter_1-1.5hp.glb", name: "Carrier Aura", cat: "carrier" },
            { file: "WCARJ012EEV CARRIER 1.5HP.glb", name: "Carrier WCARJ", cat: "carrier" },
            // Nexus
            { file: "Nexus+1-1.5Hp.glb", name: "Nexus 1.5HP", cat: "nexus" },
            { file: "Nexus 2Hp.glb", name: "Nexus 2HP", cat: "nexus" },
            // LG
            { file: "LGLA080GC2.glb", name: "LG LA080GC2", cat: "lg" },
        ];

        const grid = document.getElementById('modelGrid');
        const viewer = document.getElementById('modelViewer');
        const baseUrl = 'https://markbr123.github.io/ar-models/';
        const visibleSpan = document.getElementById('visibleCount');

        // Render cards
        function renderCards() {
            grid.innerHTML = '';
            models.forEach(model => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.dataset.file = model.file;
                card.dataset.category = model.cat;
                card.textContent = model.name;
                card.setAttribute('title', model.name);
                grid.appendChild(card);
            });

            // Add click events
            document.querySelectorAll('.model-card').forEach(card => {
                card.addEventListener('click', function() {
                    const file = this.dataset.file;
                    if (file) {
                        viewer.src = baseUrl + file;
                        document.querySelectorAll('.model-card').forEach(c => c.classList.remove('selected'));
                        this.classList.add('selected');
                    }
                });
            });

            // Select first card
            setTimeout(() => {
                const firstCard = document.querySelector('.model-card');
                if (firstCard) {
                    firstCard.classList.add('selected');
                }
            }, 100);

            applyFilter('all');
        }

        // Filter function
        function applyFilter(filter) {
            const cards = document.querySelectorAll('.model-card');
            let visible = 0;
            cards.forEach(card => {
                if (filter === 'all' || card.dataset.category === filter) {
                    card.style.display = 'inline-flex';
                    visible++;
                } else {
                    card.style.display = 'none';
                }
            });
            visibleSpan.textContent = visible + ' models visible';

            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filter);
            });
        }

        // Filter tab listeners
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => applyFilter(tab.dataset.filter));
        });

        // Initialize
        renderCards();
        viewer.src = baseUrl + 'KAM-55CMC32.glb';
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <title>Aura | AR model browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0b1825, #03070f);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* main container uses glass + dynamic spacing */
    .app {
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
      padding: 1.5rem 2rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* header with accent */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 500;
      background: linear-gradient(130deg, #d6e6ff, #9bc0f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      border-left: 5px solid #3e8eda;
      padding-left: 20px;
      text-shadow: 0 2px 5px rgba(0,30,70,0.5);
    }
    .badge {
      background: rgba(20, 40, 70, 0.6);
      backdrop-filter: blur(8px);
      padding: 8px 18px;
      border-radius: 40px;
      border: 1px solid rgba(90, 150, 255, 0.25);
      color: #b8d1ff;
      font-size: 0.9rem;
      font-weight: 400;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .badge span {
      color: white;
      font-weight: 600;
      margin-left: 6px;
      background: #1e4979;
      padding: 2px 8px;
      border-radius: 30px;
    }

    /* model viewer — cinematic */
    .viewer-wrap {
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 30px 45px -15px rgba(0,0,0,0.8), 0 0 0 1px rgba(70, 140, 230, 0.3) inset;
      background: #0a121f;
      transition: box-shadow 0.3s;
    }
    .viewer-wrap:hover {
      box-shadow: 0 35px 55px -15px #000d1a, 0 0 0 1.5px #3f8ad4 inset;
    }
    model-viewer {
      width: 100%;
      height: 52vh;
      min-height: 380px;
      background: #030a14;
      --progress-bar-color: #ffb347;
      --progress-bar-height: 3px;
    }
    /* custom AR button inside viewer */
    model-viewer::part(ar-button) {
      background: linear-gradient(145deg, #1d3c64, #0f2640);
      border-radius: 40px !important;
      color: white;
      font-weight: 500;
      border: 1px solid #5282c0;
      box-shadow: 0 10px 20px -5px #00000070;
      backdrop-filter: blur(5px);
      padding: 12px 28px !important;
      margin: 16px !important;
    }

    /* category filters / elegant scroll area */
    .library {
      background: rgba(12, 22, 36, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 1.8rem 1.8rem 1.2rem 1.8rem;
      border: 1px solid rgba(65, 115, 175, 0.35);
      box-shadow: 0 25px 40px -20px black, 0 0 0 1px rgba(75,130,210,0.2) inset;
    }

    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(96, 146, 206, 0.2);
      padding-bottom: 18px;
    }
    .category-tab {
      background: transparent;
      border: none;
      color: #a2bbda;
      font-size: 1rem;
      font-weight: 500;
      padding: 6px 0 8px 0;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: 0.2s;
      letter-spacing: 0.3px;
    }
    .category-tab:hover {
      color: white;
      border-bottom-color: #5289cf;
    }
    .category-tab.active {
      color: white;
      border-bottom-color: #73b0ff;
      text-shadow: 0 0 6px #2670ff;
    }

    /* model grid — modern card design */
    .model-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      max-height: 32vh;
      overflow-y: auto;
      padding: 6px 4px 14px 4px;
      align-items: start;
      scrollbar-width: thin;
      scrollbar-color: #3f6ea0 #0d1a2b;
    }
    .model-grid::-webkit-scrollbar {
      width: 6px;
    }
    .model-grid::-webkit-scrollbar-track {
      background: #0f1e30;
      border-radius: 20px;
    }
    .model-grid::-webkit-scrollbar-thumb {
      background: #2b5580;
      border-radius: 20px;
      border: 1px solid #3d6daa;
    }

    /* individual cards */
    .model-card {
      background: linear-gradient(150deg, #1b2c42, #112131);
      border: 1px solid rgba(75, 140, 220, 0.4);
      border-radius: 60px; /* high for pill shape with longer text */
      padding: 10px 22px 10px 22px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #e0edff;
      cursor: pointer;
      box-shadow: 0 8px 12px -8px rgba(0,0,0,0.6), 0 0 0 1px rgba(90, 155, 255, 0.15) inset;
      backdrop-filter: blur(5px);
      transition: 0.2s ease;
      white-space: nowrap;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .model-card::before {
      content: "❄️";
      font-size: 0.9rem;
      opacity: 0.8;
      filter: drop-shadow(0 2px 2px #7fb0ff);
    }
    .model-card:hover {
      background: linear-gradient(150deg, #234a70, #193656);
      border-color: #6ea2e0;
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 16px 20px -12px #000000, 0 0 0 1.5px #9ac0f0 inset;
      color: white;
    }
    .model-card.selected {
      background: linear-gradient(150deg, #1f4f82, #103457);
      border-color: #97c0ff;
      box-shadow: 0 0 18px #3f8ef0, 0 0 0 2px #b8d6ff inset;
      color: white;
      font-weight: 600;
    }
    .model-card.selected::before {
      content: "✨";
    }

    /* footer detail */
    .footer-note {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 20px;
      color: #6183b0;
      font-size: 0.8rem;
      border-top: 1px dashed #2d4a70;
      padding-top: 14px;
    }
    .pill-light {
      background: #142c44;
      padding: 6px 14px;
      border-radius: 30px;
      border: 1px solid #32577e;
      color: #bbd6ff;
    }

    /* quick category filter functionality (pure css toggle not needed, we use js filter) */
    .hidden-category {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- header area with dynamic vibe -->
    <div class="header">
      <h1>❄️ AR COOL · inverter collection</h1>
      <div class="badge">
        <span>34</span> models ready
      </div>
    </div>

    <!-- viewer -->
    <div class="viewer-wrap">
      <model-viewer
        id="modelViewer"
        src="https://markbr123.github.io/ar-models/KAM-55CMC32.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-placement="floor"
        ar-scale="auto"
        camera-controls
        exposure="0.85"
        shadow-intensity="0.4"
        autoplay
        environment-image="neutral">
        <button slot="ar-button" style="background: linear-gradient(135deg,#1d428a, #0f2d5c); border-radius: 30px; border: 1px solid #5c9eff; padding: 12px 28px; color: white; font-weight: 600; backdrop-filter: blur(4px);">
          🔍 PLACE IN YOUR SPACE
        </button>
      </model-viewer>
    </div>

    <!-- library card with categories + cards -->
    <div class="library">
      <!-- category tabs (click to filter) -->
      <div class="category-tabs">
        <button class="category-tab active" data-cat="all">✨ ALL MODELS</button>
        <button class="category-tab" data-cat="tosot-fuji">🥶 TOSOT · FUJIDENZO</button>
        <button class="category-tab" data-cat="gree-kolin">🌀 GREE · KOLIN</button>
        <button class="category-tab" data-cat="daikin">🏯 DAIKIN</button>
        <button class="category-tab" data-cat="carrier-nexus">Ⓜ️ CARRIER · NEXUS</button>
        <button class="category-tab" data-cat="lg-misc">📀 LG · extra</button>
      </div>

      <!-- dynamic grid: all model cards will be placed here with data-category attributes for filtering -->
      <div class="model-grid" id="modelGrid"></div>

      <!-- subtle count line -->
      <div class="footer-note">
        <span class="pill-light"><span id="visibleCount">34</span> models · click any to load</span>
      </div>
    </div>
  </div>

  <!-- script: generate cards + filtering + selection -->
  <script>
    (function() {
      // ---------------------------------------------------------------
      // COMPLETE LIST of all model filenames (exactly from prompt)
      // we also assign a display name and category
      // ---------------------------------------------------------------
      const models = [
        // Tosot / Fujidenzo group
        { file: "Tosot-supracol-inverter.glb", name: "Tosot Supracol Inverter", cat: "tosot-fuji" },
        { file: "fujidenzo_war100igt_with_remote.glb", name: "Fujidenzo WAR100IGT + remote", cat: "tosot-fuji" },
        { file: "fujidenzo-wam632igt.glb", name: "Fujidenzo WAM632IGT", cat: "tosot-fuji" },
        { file: "fujidenzo-war632igt.glb", name: "Fujidenzo WAR632IGT", cat: "tosot-fuji" },
        { file: "WAR100IGT_with_remote.glb", name: "WAR100IGT with remote", cat: "tosot-fuji" },
        { file: "WAR632IGT.glb", name: "WAR632IGT", cat: "tosot-fuji" },
        { file: "WAM632IGT.glb", name: "WAM632IGT", cat: "tosot-fuji" },
        { file: "sample_WAR100IGT_with_remote.glb", name: "sample WAR100IGT remote", cat: "tosot-fuji" },
        
        // Gree / Kolin / premium
        { file: "gree-full-dc-inverter-1and1.5hp.glb", name: "Gree Full DC 1&1.5HP", cat: "gree-kolin" },
        { file: "KOLIN KAM-75DRC32.glb", name: "KOLIN KAM-75DRC32", cat: "gree-kolin" },
        { file: "Kolin_Premium_primus_gold.glb", name: "Kolin Premium Primus Gold", cat: "gree-kolin" },
        { file: "Kolin KAG75WCINV, KAG100WCINV, KAG....glb", name: "Kolin KAG75/100 series", cat: "gree-kolin" },
        { file: "KAM-75DRC32.glb", name: "KAM-75DRC32", cat: "gree-kolin" },
        { file: "KAM-55CMC32.glb", name: "KAM-55CMC32", cat: "gree-kolin" },

        // Daikin family
        { file: "daikin-D-Series-FTKQ25BVA-1Hp.glb", name: "Daikin D FTKQ25BVA 1HP", cat: "daikin" },
        { file: "daikin-D-Series-FTKQ35BVA-1.5-2Hp.glb", name: "Daikin D FTKQ35BVA 1.5-2HP", cat: "daikin" },
        { file: "daikin-D-Series-FTKQ60BVA-FTKQ71BVA.glb", name: "Daikin D FTKQ60/71BVA", cat: "daikin" },
        { file: "daikin-king-series-1-1.5hp.glb", name: "Daikin King 1-1.5HP", cat: "daikin" },
        { file: "daikin-king-series-2-3hp.glb", name: "Daikin King 2-3HP", cat: "daikin" },
        { file: "daikin-queen-ava-1-1.5hp.glb", name: "Daikin Queen AVA 1-1.5HP", cat: "daikin" },
        { file: "daikin-queen-ava-2-2.5hp.glb", name: "Daikin Queen AVA 2-2.5HP", cat: "daikin" },

        // Carrier / Nexus
        { file: "WCARJ012EEV CARRIER 1.5HP.glb", name: "Carrier WCARJ012EEV 1.5HP", cat: "carrier-nexus" },
        { file: "carrier_aura_inverter_1-1.5hp.glb", name: "Carrier Aura 1-1.5HP", cat: "carrier-nexus" },
        { file: "carrier_aura_inverter_2.5hp.glb", name: "Carrier Aura 2.5HP", cat: "carrier-nexus" },
        { file: "carrier_aura_inverter_2hp.glb", name: "Carrier Aura 2HP", cat: "carrier-nexus" },
        { file: "Nexus 2.5Hp.glb", name: "Nexus 2.5HP", cat: "carrier-nexus" },
        { file: "Nexus 2Hp.glb", name: "Nexus 2HP", cat: "carrier-nexus" },
        { file: "Nexus+1-1.5Hp.glb", name: "Nexus 1-1.5HP", cat: "carrier-nexus" },

        // LG and extra (plus any missing)
        { file: "LGLA080GC2.glb", name: "LG LA080GC2", cat: "lg-misc" },
        { file: "KAM-75DRC32.glb", name: "KAM-75DRC32 (dup)", cat: "lg-misc" }, // but unique file
        { file: "Kolin KAG75WCINV, KAG100WCINV, KAG....glb", name: "Kolin KAG (alt)", cat: "lg-misc" },
        { file: "KAM-55CMC32.glb", name: "KAM-55CMC32 (dup)", cat: "lg-misc" },
        // ensure sample already present? but we add one more to cover all.
        { file: "sample_WAR100IGT_with_remote.glb", name: "sample WAR100 (already)", cat: "lg-misc" }, // duplicate but fine.
      ];

      // remove duplicate entries? we can keep as is; but we'll display all unique combos.
      // use map to deduplicate by file name (preserve first occurrence)
      const uniqueMap = new Map();
      models.forEach(m => {
        if (!uniqueMap.has(m.file)) uniqueMap.set(m.file, m);
      });
      const uniqueModels = Array.from(uniqueMap.values());

      // references
      const grid = document.getElementById('modelGrid');
      const viewer = document.getElementById('modelViewer');
      const baseUrl = 'https://markbr123.github.io/ar-models/';
      let activeCategory = 'all';

      // render all cards
      function renderCards() {
        grid.innerHTML = '';
        uniqueModels.forEach(model => {
          const card = document.createElement('div');
          card.className = 'model-card';
          card.dataset.file = model.file;
          card.dataset.category = model.cat;
          // use name, truncate if needed
          card.textContent = model.name.length > 40 ? model.name.slice(0,38)+'…' : model.name;
          card.setAttribute('title', model.name); // full name on hover
          grid.appendChild(card);
        });
        attachCardHandlers();
        updateSelectedStyle('KAM-55CMC32.glb'); // default selected
        filterByCategory('all'); // show all initially
      }

      // attach click to each card
      function attachCardHandlers() {
        document.querySelectorAll('.model-card').forEach(card => {
          card.addEventListener('click', (e) => {
            const file = card.dataset.file;
            if (!file) return;
            viewer.src = baseUrl + file;
            // remove selected from all cards
            document.querySelectorAll('.model-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
          });
        });
      }

      // highlight default card based on filename
      function updateSelectedStyle(defaultFile) {
        document.querySelectorAll('.model-card').forEach(c => {
          if (c.dataset.file === defaultFile) {
            c.classList.add('selected');
          }
        });
      }

      // filter function
      function filterByCategory(cat) {
        activeCategory = cat;
        const cards = document.querySelectorAll('.model-card');
        let visible = 0;
        cards.forEach(card => {
          if (cat === 'all' || card.dataset.category === cat) {
            card.style.display = 'inline-flex'; // visible
            visible++;
          } else {
            card.style.display = 'none';
          }
        });
        document.getElementById('visibleCount').innerText = visible;
        // update active tab
        document.querySelectorAll('.category-tab').forEach(tab => {
          tab.classList.toggle('active', tab.dataset.cat === cat);
        });
      }

      // set up category tabs click
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          filterByCategory(tab.dataset.cat);
        });
      });

      // initial render
      renderCards();

      // ensure default model loaded
      viewer.src = baseUrl + 'KAM-55CMC32.glb';

      // additional small effect: update visible count on filter, but we already did.
      // also make sure long cards don't break; but fine.
    })();
  </script>

  <!-- tiny style to adjust card pseudo content because we added textContent -->
  <style>
    /* we override the ::before because we set textContent */
    .model-card::before {
      content: "❄️";
      margin-right: 6px;
      font-size: 1rem;
    }
    .model-card.selected::before {
      content: "✨";
    }
    /* ensure no layout shift */
    .model-card {
      display: inline-flex;
      align-items: center;
    }
  </style>
</body>
</html>

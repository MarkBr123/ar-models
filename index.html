<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body { margin:0; }
    model-viewer { width:100%; height:100vh; }
  </style>
</head>
<body>

<model-viewer
  src="https://markbr123.github.io/ar-models/KAM-55CMC32.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-placement="floor"
  camera-controls
  auto-rotate>

  <button slot="ar-button">
    View in your space
  </button>

</model-viewer>

</body>
</html>

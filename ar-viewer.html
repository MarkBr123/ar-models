<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>AR Model Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { margin: 0; overflow: hidden; background: #030c1a; }

model-viewer { 
    width: 100%; 
    height: 100vh; 
}

.back-btn {
    position: absolute; 
    top: 20px; 

    background: rgba(0,0,0,0.7); 
    color: white;
    padding: 10px 20px; 
    border-radius: 30px;
    text-decoration: none; 
    z-index: 100;
    border: 1px solid #4a90e2;
}

.qr-container {
    position: fixed;                /* stays in place */
    top: 50%;                       /* vertical center */
    left: 50%;                      /* horizontal center */
    transform: translate(-50%, -50%);  /* truly center it */
    background: rgba(0,0,0,0.75);
    padding: 20px;                  /* more padding for large QR */
    border-radius: 15px;
    text-align: center;
    color: white;
    z-index: 200;
}

#qrcode {
    margin-top: 10px;
    width: 200px !important;        /* bigger QR code */
    height: 200px !important;
}
</style>

</head>

<body>

<a href="javascript:history.back()" class="back-btn">← Back</a>

<model-viewer 
id="viewer"
ar
ar-modes="webxr quick-look"
camera-controls
auto-rotate
shadow-intensity="0.5"
ar-placement="floor">

<button slot="ar-button" 
style="background:#4a90e2; color:white; border:none; border-radius:40px; padding:15px 30px; position:absolute; bottom:30px; left:50%; transform:translateX(-50%);">
📱 VIEW IN AR
</button>

</model-viewer>

<!-- QR CODE -->
<div class="qr-container">
<div>Scan for AR</div>
<div id="qrcode"></div>
</div>

<script>

// Get model from URL parameter
const urlParams = new URLSearchParams(window.location.search);
const model = urlParams.get('model');

if (model) {
    const viewer = document.getElementById('viewer');
    viewer.src = `https://markbr123.github.io/ar-models/models/${model}.glb`;
} else {
    alert('No model specified');
}

// Generate QR Code
new QRCode(document.getElementById("qrcode"), {
    text: window.location.href,
    width: 120,
    height: 120
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>AR Model Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { 
    margin: 0; 
    overflow: hidden; 
    background: #030c1a; 
    font-family: Arial, sans-serif;
}

model-viewer { 
    width: 100%; 
    height: 100vh; 
}

.back-btn {
    position: absolute; 
    top: 20px; 
    left: 20px;
    background: rgba(0,0,0,0.7); 
    color: white;
    padding: 10px 20px; 
    border-radius: 30px;
    text-decoration: none; 
    z-index: 100;
    border: 1px solid #4a90e2;
}

/* QR container for desktop */
.qr-container {
    position: fixed;
    top: 20px;
    right: 20px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    color: black;
    z-index: 200;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    border: 2px solid #4a90e2;
}

.qr-container div:first-child {
    font-weight: bold;
    margin-bottom: 10px;
    color: #333;
}

/* Make QR code visible */
#qrcode {
    margin: 0 auto;
    width: 200px !important;
    height: 200px !important;
}

#qrcode img {
    width: 100%;
    height: 100%;
}

/* Hide QR on mobile (users will tap AR button instead) */
@media (max-width: 768px) {
    .qr-container {
        display: none;
    }
}
</style>

</head>
<body>

<a href="javascript:history.back()" class="back-btn">← Back</a>

<model-viewer 
    id="viewer"
    ar
    ar-modes="webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="0.5"
    ar-placement="floor"
    exposure="0.8">

    <button slot="ar-button" 
        style="background:#4a90e2; color:white; border:none; border-radius:40px; padding:15px 30px; position:absolute; bottom:30px; left:50%; transform:translateX(-50%); font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.5);">
        📱 VIEW IN AR
    </button>

</model-viewer>

<!-- QR CODE -->
<div class="qr-container">
    <div>📱 Scan to View in AR</div>
    <div id="qrcode"></div>
    <div style="font-size:12px; margin-top:8px; color:#666;" id="modelName"></div>
</div>

<script>
// List of allowed models
const allowedModels = [
    "CAR-SPL00001",
    "DAI-SPL00001", 
    "KOP-SPL00001",
    "LGC-SPL00001",
    "PAN-SPL00001"
];

// Get model from URL parameter
const urlParams = new URLSearchParams(window.location.search);
let model = urlParams.get('model');

// Validate model
if (!model || !allowedModels.includes(model)) {
    console.warn('Invalid model, using default');
    model = "CAR-SPL00001";
}

// Display model name
document.getElementById('modelName').textContent = model;

// Set the model in model-viewer
const viewer = document.getElementById('viewer');
const modelUrl = `https://markbr123.github.io/ar-models/models/${model}.glb`;
viewer.src = modelUrl;

// Generate QR code pointing to this exact page with model parameter
function generateQR(modelName) {
    const qrContainer = document.getElementById("qrcode");
    qrContainer.innerHTML = ""; // Clear any previous QR
    
    // Get the current page URL with the model parameter
    const currentUrl = window.location.href;
    
    try {
        new QRCode(qrContainer, {
            text: currentUrl,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H // Better error correction
        });
        console.log("QR generated for:", currentUrl);
    } catch (error) {
        console.error("QR generation failed:", error);
    }
}

// Generate QR for current model
setTimeout(() => generateQR(model), 500);

// Optional: Test if QR library loaded
console.log("QRCode library loaded:", typeof QRCode !== 'undefined');
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>AR Model Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { 
    margin: 0; 
    overflow: hidden; 
    background: #030c1a; 
    font-family: Arial, sans-serif;
}

model-viewer { 
    width: 100%; 
    height: 100vh; 
}

.back-btn {
    position: absolute; 
    top: 20px; 
    left: 20px;
    background: rgba(0,0,0,0.7); 
    color: white;
    padding: 10px 20px; 
    border-radius: 30px;
    text-decoration: none; 
    z-index: 100;
    border: 1px solid #4a90e2;
}

/* QR container for desktop */
.qr-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.75);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    color: white;
    z-index: 200;
}

/* Large QR */
#qrcode {
    margin-top: 10px;
    width: 220px !important;
    height: 220px !important;
}

/* Hide QR on mobile (users will tap AR button instead) */
@media (max-width: 768px) {
    .qr-container {
        display: none;
    }
}
</style>

</head>
<body>

<a href="javascript:history.back()" class="back-btn">← Back</a>

<model-viewer 
    id="viewer"
    ar
    ar-modes="webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="0.5"
    ar-placement="floor">

    <button slot="ar-button" 
        style="background:#4a90e2; color:white; border:none; border-radius:40px; padding:15px 30px; position:absolute; bottom:30px; left:50%; transform:translateX(-50%);">
        📱 VIEW IN AR
    </button>

</model-viewer>

<!-- QR CODE -->
<div class="qr-container">
    <div>Scan for AR</div>
    <div id="qrcode"></div>
</div>

<script>
// List of allowed models
const allowedModels = [
    "CAR-SPL00001",
    "DAI-SPL00001",
    "KOP-SPL00001",
    "LGC-SPL00001",
    "PAN-SPL00001"
];

// Get model from URL parameter
const urlParams = new URLSearchParams(window.location.search);
let model = urlParams.get('model');

// Validate model
if (!model || !allowedModels.includes(model)) {
    alert('No valid model specified. Defaulting to CAR-SPL00001.');
    model = "CAR-SPL00001";
}

// Set the model in model-viewer
const viewer = document.getElementById('viewer');
viewer.src = `https://markbr123.github.io/ar-models/models/${model}.glb`;

// Generate QR code pointing to the live URL
function generateQR(modelName) {
    const qrContainer = document.getElementById("qrcode");
    qrContainer.innerHTML = ""; // Clear any previous QR
    new QRCode(qrContainer, {
        text: `https://markbr123.github.io/ar-models/ar-viewer.html?model=${modelName}`,
        width: 220,
        height: 220
    });
}

// Generate QR for current model
generateQR(model);

// OPTIONAL: You can allow model switching dynamically
// For example, you could add buttons to switch models and call generateQR(newModel)
</script>

</body>
</html>

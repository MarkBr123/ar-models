<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AR Model Viewer</title>
    
    <!-- Google Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #030c1a; 
            font-family: Arial, sans-serif;
        }
        
        model-viewer { 
            width: 100%; 
            height: 100vh; 
        }
        
        .back-btn {
            position: absolute; 
            top: 20px; 
            left: 20px;
            background: rgba(0,0,0,0.7); 
            color: white;
            padding: 10px 20px; 
            border-radius: 30px;
            text-decoration: none; 
            z-index: 100;
            border: 1px solid #4a90e2;
        }
        
        /* CENTERED QR CONTAINER */
        .qr-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid #4a90e2;
            max-width: 280px;
            width: 90%;
        }
        
        .qr-container div:first-child {
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }
        
        #qrcode {
            margin: 0 auto;
            width: 220px !important;
            height: 220px !important;
        }
        
        #qrcode img {
            width: 100%;
            height: 100%;
        }
        
        .model-name {
            font-size: 14px;
            margin-top: 12px;
            color: #666;
            font-weight: 500;
        }
        
        /* Hide QR on mobile */
        @media (max-width: 768px) {
            .qr-container {
                display: none;
            }
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="back-btn">← Back</a>
    
    <model-viewer 
        id="viewer"
        ar
        ar-modes="webxr quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="0.5"
        ar-placement="floor"
        exposure="0.8">
        
        <button slot="ar-button" 
            style="background:#4a90e2; color:white; border:none; border-radius:40px; padding:15px 30px; position:absolute; bottom:30px; left:50%; transform:translateX(-50%); font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.5);">
            📱 VIEW IN AR
        </button>
    </model-viewer>
    
    <div class="qr-container">
        <div>📱 SCAN TO VIEW IN AR</div>
        <div id="qrcode"></div>
        <div class="model-name" id="modelName"></div>
        <div style="font-size:12px; margin-top:8px; color:#999;">Use your phone camera to scan</div>
    </div>
    
    <script>
        // Get model from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        let model = urlParams.get('model');
        
        // Default if no model specified
        if (!model) {
            model = "CAR-SPL00001";
        }
        
        // Display model name
        document.getElementById('modelName').textContent = model;
        
        // Set the model in model-viewer
        const viewer = document.getElementById('viewer');
        viewer.src = `https://markbr123.github.io/ar-models/models/${model}.glb`;
        
        // Generate QR code
        function generateQR(modelName) {
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";
            
            const currentUrl = `https://markbr123.github.io/ar-models/ar-viewer.html?model=${modelName}`;
            
            new QRCode(qrContainer, {
                text: currentUrl,
                width: 220,
                height: 220,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }
        
        // Generate QR when page loads
        generateQR(model);
    </script>
</body>
</html>

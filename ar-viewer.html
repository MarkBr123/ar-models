<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AR Model Viewer</title>
    
    <!-- Google Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #030c1a; 
            font-family: Arial, sans-serif;
        }
        
        model-viewer { 
            width: 100%; 
            height: 100vh; 
        }
        
        .back-btn {
            position: absolute; 
            top: 20px; 
            left: 20px;
            background: rgba(0,0,0,0.7); 
            color: white;
            padding: 10px 20px; 
            border-radius: 30px;
            text-decoration: none; 
            z-index: 100;
            border: 1px solid #4a90e2;
            font-size: 14px;
        }
        
        /* QR Container - Top Right for Desktop */
        .qr-container {
            position: fixed;
            top: 80px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            z-index: 200;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 2px solid #4a90e2;
            width: 200px;
        }
        
        #qrcode {
            margin: 0 auto;
            width: 180px !important;
            height: 180px !important;
        }
        
        .qr-container .label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .model-name {
            font-size: 12px;
            margin-top: 10px;
            color: #333;
            font-weight: 500;
            word-break: break-all;
        }
        
        /* Hide QR on mobile */
        @media (max-width: 768px) {
            .qr-container {
                display: none;
            }
        }

        .loading {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 150;
        }

        /* AR Button Styling - This is the key part */
        .ar-button {
            background: #4a90e2 !important;
            color: white !important;
            border: 2px solid white !important;
            border-radius: 40px !important;
            padding: 15px 30px !important;
            font-size: 16px !important;
            font-weight: bold !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important;
            backdrop-filter: blur(5px) !important;
            cursor: pointer !important;
            display: block !important;
            margin: 0 auto !important;
            width: fit-content !important;
            position: absolute !important;
            bottom: 30px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 10 !important;
        }

        /* Mobile optimization */
        @media (max-width: 768px) {
            .ar-button {
                padding: 12px 24px !important;
                font-size: 14px !important;
                bottom: 20px !important;
            }
            
            .back-btn {
                font-size: 12px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="back-btn">← Back to Product</a>
    
    <div class="loading" id="loading">Loading 3D Model...</div>
    
    <!-- QR Container - Desktop Only (Top Right) -->
    <div class="qr-container">
        <div class="label">📱 SCAN TO VIEW ON PHONE</div>
        <div id="qrcode"></div>
        <div class="model-name" id="modelName"></div>
    </div>
    
    <model-viewer 
        id="viewer"
        ar
        ar-modes="webxr quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="0.5"
        ar-placement="floor"
        exposure="0.8"
        loading="eager">
        
        <!-- AR Button - Will show on mobile -->
        <button slot="ar-button" class="ar-button">
            📱 VIEW IN YOUR SPACE
        </button>
    </model-viewer>
    
<script>
    // Map SKU codes to actual filenames in your GitHub
    const modelMap = {
        "CAR-SPL00001": "carrier_aura_inverter_1-1.5hp.glb",
        "DAI-SPL00001": "daikin-D-Series-FTKQ25BVA-1HP.glb",
        "KOP-SPL00001": "kolin-certus-premium-1.5hp.glb",
        "LGC-SPL00001": "lg_dual_inverter_premium.glb",
        "PAN-SPL00001": "panasonic_premium_inverter_xu_series_1-1.5hp.glb",
        "KAM-55CMC32": "KAM-55CMC32.glb",
        "WAR100IGT": "fujidenzo_war100igt_with_remote.glb",
        "WAM632IGT": "fujidenzo-wam632igt.glb"
    };
    
    // Get model from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    let sku = urlParams.get('model');
    
    // Default if no model specified
    if (!sku || !modelMap[sku]) {
        sku = "CAR-SPL00001";
    }
    
    // Get actual filename from map
    const filename = modelMap[sku];
    
    // Display model name in QR
    document.getElementById('modelName').textContent = `SKU: ${sku}`;
    
    // Set the model in model-viewer
    const viewer = document.getElementById('viewer');
    const loading = document.getElementById('loading');
    
    // Construct the correct URL with the actual filename
    const modelUrl = `https://markbr123.github.io/ar-models/${filename}`;
    console.log('Loading model from:', modelUrl);
    
    // Load the model
    viewer.src = modelUrl;
    
    viewer.addEventListener('load', () => {
        console.log('✅ Model loaded!');
        loading.style.display = 'none';
    });
    
    viewer.addEventListener('error', (e) => {
        console.error('❌ Failed to load:', modelUrl);
        loading.textContent = `❌ Failed to load: ${filename}`;
        loading.style.background = 'rgba(255,0,0,0.7)';
        
        // Try alternative path if file not found
        const altUrl = `https://markbr123.github.io/ar-models/models/${filename}`;
        console.log('Trying alternative path:', altUrl);
        viewer.src = altUrl;
    });
    
    // Generate QR code for desktop users
    function generateQR(sku) {
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        
        // QR code uses the same URL format
        const currentUrl = `https://markbr123.github.io/ar-models/ar-viewer.html?model=${sku}`;
        
        new QRCode(qrContainer, {
            text: currentUrl,
            width: 180,
            height: 180,
            correctLevel: QRCode.CorrectLevel.H
        });
    }
    
    generateQR(sku);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AR Model Viewer</title>
    
    <!-- Google Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background: #030c1a; 
            font-family: Arial, sans-serif;
            height: 100vh;
            width: 100vw;
        }
        
        model-viewer { 
            width: 100%; 
            height: 100vh; 
            background: #030c1a;
        }
        
        .back-btn {
            position: fixed; 
            top: 20px; 
            left: 20px;
            background: rgba(0,0,0,0.8); 
            color: white;
            padding: 10px 20px; 
            border-radius: 30px;
            text-decoration: none; 
            z-index: 1000;
            border: 2px solid #4a90e2;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        
        /* QR Container - Desktop Only */
        .qr-container {
            position: fixed;
            top: 80px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 2px solid #4a90e2;
            width: 200px;
        }
        
        #qrcode {
            margin: 0 auto;
            width: 170px !important;
            height: 170px !important;
        }
        
        .qr-container .label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .model-name {
            font-size: 12px;
            margin-top: 10px;
            color: #333;
            font-weight: 500;
        }
        
        /* Hide QR on mobile */
        @media (max-width: 768px) {
            .qr-container {
                display: none;
            }
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 500;
            font-size: 14px;
            border: 2px solid #4a90e2;
        }

        /* SIMPLE AR BUTTON STYLING - This will work */
        .ar-button {
            position: fixed !important;
            bottom: 30px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            background: #4a90e2 !important;
            color: white !important;
            border: 3px solid white !important;
            border-radius: 50px !important;
            padding: 16px 32px !important;
            font-size: 18px !important;
            font-weight: bold !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8) !important;
            cursor: pointer !important;
            z-index: 9999 !important;
            width: auto !important;
            min-width: 220px !important;
            text-align: center !important;
            letter-spacing: 1px !important;
        }

        /* Mobile optimization */
        @media (max-width: 768px) {
            .ar-button {
                padding: 14px 28px !important;
                font-size: 16px !important;
                min-width: 200px !important;
                bottom: 25px !important;
                border-width: 2px !important;
            }
        }

        /* Small phones */
        @media (max-width: 380px) {
            .ar-button {
                padding: 12px 24px !important;
                font-size: 14px !important;
                min-width: 180px !important;
                bottom: 20px !important;
            }
        }

        /* Hide any default AR button */
        model-viewer::part(default-ar-button) {
            display: none !important;
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="back-btn">← Back</a>
    
    <div class="loading" id="loading">Loading 3D Model...</div>
    
    <!-- QR Container - Desktop Only -->
    <div class="qr-container">
        <div class="label">📱 SCAN TO VIEW ON PHONE</div>
        <div id="qrcode"></div>
        <div class="model-name" id="modelName">Panasonic</div>
    </div>
    
    <model-viewer 
        id="viewer"
        ar
        ar-modes="webxr quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="0.5"
        ar-placement="wall"
        exposure="0.8"
        loading="eager"
        reveal="auto">
        
        <!-- AR Button - This WILL show on mobile -->
        <button slot="ar-button" class="ar-button">
            📱 VIEW IN YOUR SPACE
        </button>
    </model-viewer>
    
<script>
    // Map SKU codes to actual filenames
    const modelMap = {
        "CAR-SPL00001": "carrier_aura_inverter_1-1.5hp.glb",
        "DAI-SPL00001": "DAI-SPL00001",
        "KOP-SPL00001": "Koppel_Lunaire_Inverter_1.5HP.glb",
        "LGC-SPL00001": "lg_dual_inverter_premium.glb",
        "PAN-SPL00001": "panasonic_premium_inverter_xu_series_1-1.5hp.glb",
        "KAM-55CMC32": "KAM-55CMC32.glb",
        "WAR100IGT": "fujidenzo_war100igt_with_remote.glb",
        "WAM632IGT": "fujidenzo-wam632igt.glb"
    };
    
    // Get model from URL
    const urlParams = new URLSearchParams(window.location.search);
    let sku = urlParams.get('model') || "CAR-SPL00001";
    
    // Get filename
    const filename = modelMap[sku] || "carrier_aura_inverter_1-1.5hp.glb";
    
    // Display model name
    document.getElementById('modelName').textContent = sku;
    
    // Load model
    const viewer = document.getElementById('viewer');
    const loading = document.getElementById('loading');
    
    // Try different paths
    const paths = [
        `https://markbr123.github.io/ar-models/${filename}`,
        `https://markbr123.github.io/ar-models/models/${filename}`,
        `https://markbr123.github.io/ar-models/ar-models/${filename}`
    ];
    
    let currentPathIndex = 0;
    
    function tryLoadModel() {
        if (currentPathIndex >= paths.length) {
            loading.textContent = '❌ Model not found';
            loading.style.background = 'rgba(255,0,0,0.7)';
            return;
        }
        
        const modelUrl = paths[currentPathIndex];
        console.log(`Trying path ${currentPathIndex + 1}:`, modelUrl);
        loading.textContent = `Loading model... (${currentPathIndex + 1}/${paths.length})`;
        
        viewer.src = modelUrl;
    }
    
    viewer.addEventListener('load', () => {
        console.log('✅ Model loaded!');
        loading.style.display = 'none';
    });
    
    viewer.addEventListener('error', () => {
        currentPathIndex++;
        tryLoadModel();
    });
    
    // Start loading
    tryLoadModel();
    
    // Generate QR code
    function generateQR(sku) {
        const qrContainer = document.getElementById("qrcode");
        if (!qrContainer) return;
        
        qrContainer.innerHTML = "";
        const currentUrl = `https://markbr123.github.io/ar-models/ar-viewer.html?model=${sku}`;
        
        new QRCode(qrContainer, {
            text: currentUrl,
            width: 170,
            height: 170,
            correctLevel: QRCode.CorrectLevel.H
        });
    }
    
    generateQR(sku);
    
    // FORCE AR BUTTON TO SHOW ON MOBILE
    if (window.innerWidth <= 768) {
        console.log('📱 Mobile detected - forcing AR button');
        setTimeout(() => {
            const arBtn = document.querySelector('.ar-button');
            if (arBtn) {
                arBtn.style.display = 'block';
                arBtn.style.visibility = 'visible';
                arBtn.style.opacity = '1';
                console.log('✅ AR button forced visible');
            }
        }, 1000);
    }
</script>
</body>
</html>

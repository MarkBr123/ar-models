<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AR Model Viewer</title>
    
    <!-- Google Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #030c1a; 
            font-family: Arial, sans-serif;
        }
        
        model-viewer { 
            width: 100%; 
            height: 100vh; 
        }
        
        .back-btn {
            position: absolute; 
            top: 20px; 
            left: 20px;
            background: rgba(0,0,0,0.7); 
            color: white;
            padding: 10px 20px; 
            border-radius: 30px;
            text-decoration: none; 
            z-index: 100;
            border: 1px solid #4a90e2;
        }
        
        .qr-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid #4a90e2;
            max-width: 280px;
            width: 90%;
        }
        
        #qrcode {
            margin: 0 auto;
            width: 220px !important;
            height: 220px !important;
        }
        
        .model-name {
            font-size: 14px;
            margin-top: 12px;
            color: #666;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .qr-container {
                display: none;
            }
        }

        .loading {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 150;
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="back-btn">← Back</a>
    
    <div class="loading" id="loading">Loading 3D Model...</div>
    
    <model-viewer 
        id="viewer"
        ar
        ar-modes="webxr quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="0.5"
        ar-placement="floor"
        exposure="0.8">
        
        <button slot="ar-button" 
            style="background:#4a90e2; color:white; border:none; border-radius:40px; padding:15px 30px; position:absolute; bottom:30px; left:50%; transform:translateX(-50%); font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.5);">
            📱 TAP HERE TO VIEW IN AR
        </button>
    </model-viewer>
    
    <div class="qr-container">
        <div>📱 SCAN TO VIEW IN AR</div>
        <div id="qrcode"></div>
        <div class="model-name" id="modelName"></div>
    </div>
    
<script>
    // Map SKU codes to actual filenames in your GitHub
    const modelMap = {
        "CAR-SPL00001": "CAR-SPL00001.glb",
        "DAI-SPL00001": "daikin-D-Series-FTKQ25BVA-1HP.glb",  // Updated with correct filename
        "KOP-SPL00001": "KOP-SPL00001.glb",
        "LGC-SPL00001": "LGC-SPL00001.glb",
        "PAN-SPL00001": "panasonic_premium_inverter_xu_series_1-1.5hp.glb"
    };
    
    // Get model from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    let sku = urlParams.get('model');
    
    // Default if no model specified
    if (!sku || !modelMap[sku]) {
        sku = "CAR-SPL00001";
    }
    
    // Get actual filename from map
    const filename = modelMap[sku];
    
    // Display model name
    document.getElementById('modelName').textContent = sku;
    
    // Set the model in model-viewer
    const viewer = document.getElementById('viewer');
    const loading = document.getElementById('loading');
    
    // Construct the correct URL with the actual filename
    const modelUrl = `https://markbr123.github.io/ar-models/models/${filename}`;
    console.log('Loading model from:', modelUrl);
    
    // Load the model
    viewer.src = modelUrl;
    
    viewer.addEventListener('load', () => {
        console.log('✅ Model loaded!');
        loading.style.display = 'none';
    });
    
    viewer.addEventListener('error', (e) => {
        console.error('❌ Failed to load:', modelUrl);
        loading.textContent = `❌ Failed to load: ${filename}`;
        loading.style.background = 'rgba(255,0,0,0.7)';
    });
    
    // Generate QR code
    function generateQR(sku) {
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        
        // QR code still uses the SKU, not the filename
        const currentUrl = `https://markbr123.github.io/ar-models/ar-viewer.html?model=${sku}`;
        
        new QRCode(qrContainer, {
            text: currentUrl,
            width: 220,
            height: 220,
            correctLevel: QRCode.CorrectLevel.H
        });
    }
    
    generateQR(sku);
</script>
</body>
</html>
